<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiawPie | Experimental Terminal v2.0</title>
    <style>
        :root { --neon: #00ffff; --bg: #0d0d12; --font: 'Consolas', 'Courier New', monospace; --gold: #ffd700; }
        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: var(--font); 
            margin: 0; 
            padding: 20px; 
            font-size: 15px; 
            overflow-x: hidden; 
        }
        #terminal { max-width: 900px; margin: 30px auto; padding: 20px; border: 1px solid #1a1a1a; border-radius: 8px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        .prompt { color: var(--neon); font-weight: bold; }
        .input-area { display: flex; align-items: center; margin-top: 15px; }
        #cmd { background: transparent; border: none; color: #fff; font-family: inherit; font-size: inherit; outline: none; flex: 1; padding: 5px; cursor: text; z-index: 10; }
        
        .header { color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .title { color: var(--gold); font-size: 1.2em; font-weight: bold; }
        .highlight { color: #00ff41; font-weight: bold; }
        
        a { color: #ff00ff; text-decoration: underline; pointer-events: auto !important; position: relative; z-index: 9999; display: inline-block; cursor: pointer; }
        a:hover { color: #fff; text-decoration: none; }
        
        @keyframes blink { 50% { opacity: 0; } }
        .blink { animation: blink 1s linear infinite; }
    </style>
</head>
<body>

<audio id="bgm" src="https://www.mboxdrive.com/lovewavetoearth.mp3" loop></audio>

<div id="terminal">
    <div class="header">/* SYSTEM BOOTING... [OK] */</div>
    <br>
    <div class="title">MIOWPIE EXPERIMENTAL OS v2.0</div>
    <div>Welcome, <span class="highlight">Guest</span>. Type <span class="highlight">'help'</span> for commands.</div>
    <br>
    <div id="output"></div>
    <div class="input-area">
        <span class="prompt">miawpie@terminal:~$&nbsp;</span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('cmd');
    const audio = document.getElementById('bgm');

    const commands = {
        'help': 'Commands: <span style="color:#ff00ff;">[about, ig, skill, play, stop, secret, clear]</span>',
        'about': 'Halo! Aku <span style="color:#00ffff;">Manzz</span>. Seorang <span class="highlight">Experimental Web Developer</span> di HP. Suka logika (MTK Alef Survivor) & latihan fisik.',
        'skill': 'Pengalaman & Eksplorasi:<br>' +
                 '- <span style="color:#00ffff;">Computational Logic</span> (MTK Alef Survivor)<br>' +
                 '- <span style="color:#00ff41;">Experimental Workout</span> (Beban 5kg+ On Progress)<br>' +
                 '- <span style="color:#ffa500;">Web Development</span> (Terminal Interaktif)',
        'ig': 'Instagram: <a href="https://instagram.com/kentankxgorenk" target="_blank">@kentankxgorenk</a>',
        'play': '🎶 Memutar: <span style="color:#00ffff;">Wave to Earth - Love</span>. Enjoy the vibes...',
        'stop': '🔇 Musik dihentikan.',
        'secret': 'Loading secret data... [OK] | Fact: Bata merah 5 biji ternyata lebih berat daripada harapan orang tua. :v',
        'status': 'Status: <span class="blink">Lagi nyoba buat konsisten...</span>'
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = input.value.toLowerCase().trim();
            const line = document.createElement('div');
            line.innerHTML = `<span class="prompt">miawpie@terminal:~$&nbsp;</span>${input.value}`;
            output.appendChild(line);

            if (val === 'clear') {
                output.innerHTML = '';
            } else if (val === 'play') {
                // Triks buat browser: play dapet trigger dari enter
                audio.play().catch(error => {
                    const err = document.createElement('div');
                    err.innerHTML = `<span style="color:yellow">Klik layar dulu sekali, baru ketik play lagi ya!</span>`;
                    output.appendChild(err);
                });
                const res = document.createElement('div');
                res.innerHTML = commands[val];
                output.appendChild(res);
            } else if (val === 'stop') {
                audio.pause();
                const res = document.createElement('div');
                res.innerHTML = commands[val];
                output.appendChild(res);
            } else if (commands[val]) {
                const res = document.createElement('div');
                res.innerHTML = commands[val];
                output.appendChild(res);
            } else if (val !== "") {
                const err = document.createElement('div');
                err.innerHTML = `<span style="color:red">Command not found: ${val}</span>`;
                output.appendChild(err);
            }

            input.value = '';
            window.scrollTo(0, document.body.scrollHeight);
        }
    });

    document.addEventListener('touchstart', function(e) {
        if(e.target.tagName !== 'A') {
            input.focus();
        }
    });
</script>
</body>
</html>
